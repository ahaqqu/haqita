services:
  # Shared build config
  x-base: &base
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    env_file: ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Stage 1: Scrape (both stores)
  scrape:
    <<: *base
    command: python scripts/scrapers/scrape_all.py

  # Stage 1: Scrape Lotte only
  scrape-lotte:
    <<: *base
    command: python scripts/scrapers/lotte.py

  # Stage 1: Scrape Superindo only
  scrape-superindo:
    <<: *base
    command: python scripts/scrapers/superindo.py

  # Stage 2: OCR (both stores)
  ocr:
    <<: *base
    command: python scripts/ocr/run_ocr_all.py

  # Stage 2: OCR Lotte only
  ocr-lotte:
    <<: *base
    command: python scripts/ocr/run_ocr.py --store lotte

  # Stage 2: OCR Superindo only
  ocr-superindo:
    <<: *base
    command: python scripts/ocr/run_ocr.py --store superindo

  # Stage 3: Consolidation
  consolidate:
    <<: *base
    command: python scripts/consolidate.py

  # Full pipeline (scrape → ocr → consolidate)
  pipeline:
    <<: *base
    command: python scripts/pipeline.py
