name: CI

on:
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/matching/ tests/ocr/ tests/scrapers/ \
                 tests/cloudflare/ tests/common/ tests/test_config.py \
                 -v

  web-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Typecheck
        working-directory: ./web
        run: npm run typecheck

      - name: Run vitest
        working-directory: ./web
        run: npm test
