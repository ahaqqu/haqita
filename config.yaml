scrapers:
  lotte:
    url: https://www.lottemart.co.id/all-promo-mart
    min_image_size_kb: 50
    request_delay_seconds: 2

  superindo:
    url: https://www.superindo.co.id/promosi/katalog-super-hemat/
    region_filter: jabodetabek-palembang
    min_image_size_kb: 50
    request_delay_seconds: 2

ocr:
  provider: ollama
  model_ollama: qwen3-vl:7b
  model_gemini: gemini-2.0-flash
  timeout_seconds: 120
  max_retries: 2
  temperature: 0
  image_min_width_px: 1400
  image_contrast_enhance: 1.4
  image_sharpness_enhance: 1.2

consolidation:
  token_jaccard_min: 0.30
  embedding_model: paraphrase-multilingual-MiniLM-L12-v2
  embedding_auto_match: 0.85
  embedding_ambiguous_low: 0.55
  unit_tolerance_pct: 15
  price_ratio_max: 3.0
  ai_model: qwen3:4b
  ai_batch_size: 20

validation:
  min_price: 100
  max_price: 1000000
  min_product_name_length: 3

monitoring:
  review_queue_max: 100
  metrics_enabled: true
